name: Lint kings-cafe

on:
  push:
    branches: ['main']
    paths:
      - 'kings-cafe/**'
  pull_request:
    paths:
      - 'kings-cafe/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kings-cafe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: kings-cafe/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
